<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SportsBet AI — Live Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060A10;--s1:#0C1220;--s2:#121A2E;--s3:#1A2438;--br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.12);--ac:#00F5A0;--ac2:#FF6B35;--ac3:#6C63FF;--ac4:#FFD166;--tx:#E8EDF5;--mu:#4A5570;--mu2:#7A8AA0;--gr:#00F5A0;--yw:#FFD166;--rd:#FF4D6D;--bl:#4FC3F7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,160,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--br);backdrop-filter:blur(24px);background:rgba(6,10,16,.9);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),var(--ac3));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--ac),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(0,245,160,.08);border:1px solid rgba(0,245,160,.25);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase}
.live-dot{width:7px;height:7px;background:var(--ac);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.src-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid var(--br)}
.src-live{color:var(--gr);border-color:rgba(0,245,160,.3);background:rgba(0,245,160,.06)}
.src-curated{color:var(--yw);border-color:rgba(255,209,102,.3);background:rgba(255,209,102,.06)}

/* TICKER */
.ticker{background:linear-gradient(90deg,rgba(255,107,53,.12),rgba(255,107,53,.04));border-bottom:1px solid rgba(255,107,53,.2);padding:9px 32px;display:flex;align-items:center;gap:12px;overflow:hidden}
.ticker-lbl{font-size:10px;font-weight:800;color:var(--ac2);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;background:rgba(255,107,53,.12);padding:3px 10px;border-radius:4px;border:1px solid rgba(255,107,53,.3)}
.ticker-scroll{font-size:12px;color:var(--mu2);white-space:nowrap;animation:ticker 40s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{margin-right:60px;display:inline}
.ti span{color:var(--ac4);font-weight:700}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--br);background:var(--s1)}
.stat{padding:16px 24px;border-right:1px solid var(--br);text-align:center}
.stat:last-child{border-right:none}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--ac);line-height:1}
.stat-l{font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:3px}

/* MAIN */
main{padding:28px 32px;max-width:1600px;margin:0 auto}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--s1);padding:5px;border-radius:12px;width:fit-content;border:1px solid var(--br)}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;color:var(--mu);border:none;background:none;display:flex;align-items:center;gap:7px;letter-spacing:.3px}
.tab:hover{color:var(--tx)}
.tab.active{background:var(--s2);color:var(--tx);box-shadow:0 0 20px rgba(0,245,160,.08),inset 0 0 0 1px rgba(0,245,160,.1)}
.tab-n{background:rgba(0,245,160,.15);color:var(--ac);font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px}

/* CONTEXT BAR */
.ctx-bar{background:rgba(0,245,160,.04);border:1px solid rgba(0,245,160,.12);border-radius:10px;padding:11px 16px;margin-bottom:18px;font-size:12px;color:var(--mu2);line-height:1.5}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.sec-title .hl{color:var(--ac)}
.upd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu2);display:flex;align-items:center;gap:6px}
.upd-dot{width:6px;height:6px;background:var(--ac);border-radius:50%;animation:blink 2s infinite}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px;margin-bottom:32px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--br);border-radius:16px;overflow:hidden;transition:all .3s;animation:fadeUp .4s ease both}
.card:hover{border-color:rgba(0,245,160,.18);transform:translateY(-2px);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 30px rgba(0,245,160,.04)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-hdr{padding:12px 18px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br)}
.card-league{font-size:10px;font-weight:800;color:var(--ac);letter-spacing:2px;text-transform:uppercase}
.card-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu2)}
.card-body{padding:16px 18px}
.matchup{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.team{text-align:center;flex:1}
.team-name{font-size:14px;font-weight:700;line-height:1.3}
.team-sub{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.vs{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--mu);padding:0 12px;flex-shrink:0}

/* INTEL */
.intel{background:rgba(255,209,102,.05);border:1px solid rgba(255,209,102,.15);border-radius:8px;padding:9px 12px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.intel-ico{font-size:11px;flex-shrink:0;margin-top:1px}
.intel-txt{font-size:11px;color:var(--mu2);line-height:1.5;font-style:italic}

/* PROB BARS */
.probs{margin-bottom:14px}
.prob-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.prob-lbl{font-size:10px;color:var(--mu);width:66px;text-transform:uppercase;letter-spacing:.5px}
.prob-bg{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px;transition:width 1.2s ease}
.prob-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;width:40px;text-align:right}

/* PRED BOX */
.pred-box{background:var(--s2);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--br);margin-bottom:14px}
.pred-res{display:flex;flex-direction:column;gap:2px}
.pred-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px}
.pred-val{font-size:15px;font-weight:700;color:var(--ac)}
.ring{position:relative;width:52px;height:52px}
.ring svg{transform:rotate(-90deg)}
.ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--tx)}

/* GOALS SECTION */
.goals-section{background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.18);border-radius:10px;padding:14px;margin-bottom:0}
.goals-title{font-size:10px;font-weight:800;color:var(--ac3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.goals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.market-item{background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,.06)}
.market-name{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.market-bars{display:flex;flex-direction:column;gap:4px}
.mbar-row{display:flex;align-items:center;gap:6px}
.mbar-lbl{font-size:9px;color:var(--mu);width:28px}
.mbar-bg{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.mbar-fill{height:100%;border-radius:2px}
.mbar-val{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;width:32px;text-align:right}
.market-rec{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.5px}
.rec-yes{background:rgba(0,245,160,.12);color:var(--gr);border:1px solid rgba(0,245,160,.2)}
.rec-no{background:rgba(255,77,109,.1);color:var(--rd);border:1px solid rgba(255,77,109,.2)}

/* SCORE TABLE */
.score-table{margin-top:8px}
.score-table-title{font-size:9px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.score-chips{display:flex;flex-wrap:wrap;gap:5px}
.score-chip{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);border-radius:5px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ac3)}
.score-chip.top{background:rgba(108,99,255,.25);border-color:rgba(108,99,255,.4);color:#fff;font-weight:700}

/* CARD FOOTER */
.card-ft{padding:11px 18px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.bet-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.bet-green{background:rgba(0,245,160,.1);color:var(--gr);border:1px solid rgba(0,245,160,.22)}
.bet-yellow{background:rgba(255,209,102,.1);color:var(--yw);border:1px solid rgba(255,209,102,.22)}
.bet-red{background:rgba(255,77,109,.1);color:var(--rd);border:1px solid rgba(255,77,109,.2)}
.model-acc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px}
.spinner{width:36px;height:36px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:2px}

/* CUSTOM SECTION */
.custom-sec{background:var(--s1);border:1px solid var(--br);border-radius:16px;padding:24px;margin-bottom:32px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:16px}
.form-grp{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.form-inp{background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .2s;outline:none}
.form-inp:focus{border-color:rgba(0,245,160,.35)}
.pred-btn{background:linear-gradient(135deg,var(--ac),#00C47A);color:#000;border:none;border-radius:10px;padding:12px 28px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;margin-top:16px}
.pred-btn:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(0,245,160,.25)}
.pred-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.custom-result{margin-top:18px;background:var(--s2);border-radius:12px;padding:18px;border:1px solid rgba(0,245,160,.18);animation:fadeUp .3s ease}

footer{border-top:1px solid var(--br);padding:20px 32px;text-align:center;font-size:11px;color:var(--mu)}
.disclaimer{background:rgba(255,77,109,.05);border:1px solid rgba(255,77,109,.12);border-radius:8px;padding:9px 18px;font-size:10px;color:var(--mu2);margin-bottom:10px;display:inline-block}
@media(max-width:768px){header{padding:12px 16px}main{padding:16px}stats-bar{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}

/* HISTORY TAB */
.history-wrap{display:flex;flex-direction:column;gap:24px}
.hist-section{background:var(--s1);border:1px solid var(--br);border-radius:16px;overflow:hidden}
.hist-section-hdr{padding:14px 20px;background:var(--s2);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.hist-section-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px}
.hist-section-title .hl{color:var(--ac)}
.acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:var(--br)}
.acc-item{background:var(--s1);padding:18px 20px;text-align:center}
.acc-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ac);line-height:1}
.acc-lbl{font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.streak-badge{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac4);letter-spacing:1px;padding:8px 20px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);border-radius:8px}
.history-table{width:100%;border-collapse:collapse}
.history-table th{padding:10px 16px;text-align:left;font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--br);background:var(--s2)}
.history-table td{padding:12px 16px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.history-table tr:hover td{background:rgba(255,255,255,.02)}
.score-pill{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px;display:inline-block}
.score-pill.correct{background:rgba(0,245,160,.12);color:var(--gr);border:1px solid rgba(0,245,160,.25)}
.score-pill.wrong{background:rgba(255,77,109,.1);color:var(--rd);border:1px solid rgba(255,77,109,.2)}
.score-pill.pending{background:rgba(255,255,255,.06);color:var(--mu2);border:1px solid var(--br)}
.sport-tag{font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.sport-soccer{background:rgba(0,245,160,.12);color:var(--gr)}
.sport-nba{background:rgba(255,107,53,.12);color:var(--ac2)}
.sport-nfl{background:rgba(108,99,255,.12);color:var(--ac3)}
.sport-tennis{background:rgba(255,209,102,.12);color:var(--yw)}
.result-form{display:flex;gap:8px;align-items:center;margin-top:4px}
.score-inp{width:42px;background:var(--s3);border:1px solid var(--br2);border-radius:6px;padding:5px 8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;outline:none}
.save-result-btn{background:var(--ac3);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.save-result-btn:hover{opacity:.85}
.no-history{padding:60px;text-align:center;color:var(--mu2);font-size:13px}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px}
.ftab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--mu);border:1px solid var(--br);background:transparent;transition:all .2s}
.ftab.active,.ftab:hover{color:var(--tx);border-color:rgba(0,245,160,.3);background:rgba(0,245,160,.06)}
</style>
</head>

// ─── HELPERS ────────────────────────────────────────────────────────────────
function el(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='class')e.className=v;
    else if(k==='style')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null)continue;e.append(typeof c==='string'?document.createTextNode(c):c);}
  return e;
}
function html(s){const d=document.createElement('div');d.innerHTML=s;return d.firstChild;}

function Ring(pct){
  const r=20,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  const col=pct>=65?'#00F5A0':pct>=50?'#FFD166':'#FF4D6D';
  return html(`<div class="ring"><svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%"/></svg><div class="ring-txt">${pct}%</div></div>`);
}

function GoalsSection(g){
  if(!g) return null;
  const sec=el('div',{class:'goals-section'});

    el('div',{style:{fontSize:'11px',color:'var(--mu2)'}},`Predicted score · Total: ${g.predicted_total}`)
  );
  sec.append(scoreSum);

  const mGrid=el('div',{class:'goals-grid'});
  const markets=[
    ['Over 1.5',g.markets?.over_1_5],
    ['Over 2.5',g.markets?.over_2_5],
    ['Over 3.5',g.markets?.over_3_5],
    ['BTTS',g.markets?.btts],
  ];
  markets.forEach(([name,m])=>{

    const item=el('div',{class:'market-item'});
    item.append(el('div',{class:'market-name'},name));
    const bars=el('div',{class:'market-bars'});
    const yesColor='#00F5A0', noColor='#FF4D6D';

      el('span',{class:'mbar-val',style:{color:yesColor}},`${m.yes}%`)
    );
    const nRow=el('div',{class:'mbar-row'},
      el('span',{class:'mbar-lbl'},'NO'),
      el('div',{class:'mbar-bg'},el('div',{class:'mbar-fill',style:{width:`${m.no}%`,background:noColor}})),
      el('span',{class:'mbar-val',style:{color:noColor}},`${m.no}%`)
    );
    bars.append(yRow,nRow);
    const rec=m.recommendation==='YES'?'rec-yes':'rec-no';
    item.append(bars,el('div',{class:`market-rec ${rec}`},m.recommendation==='YES'?'✅':'❌',` ${m.recommendation}`));
    mGrid.append(item);
  });
  sec.append(mGrid);

  if(g.correct_score?.length){
    const st=el('div',{class:'score-table'});

    });
    st.append(chips);
    sec.append(st);
  }
  return sec;
}

function PredCard(p,idx){
  const card=el('div',{class:'card',style:{animationDelay:`${idx*60}ms`}});
  const hdr=el('div',{class:'card-hdr'},
    el('span',{class:'card-league'},p.league||''),
    el('span',{class:'card-date'},p.date||'')
  );
  const matchup=el('div',{class:'matchup'},
    el('div',{class:'team'},el('div',{class:'team-name'},p.home_team),el('div',{class:'team-sub'},'HOME')),
    el('div',{class:'vs'},'VS'),
    el('div',{class:'team'},el('div',{class:'team-name'},p.away_team),el('div',{class:'team-sub'},'AWAY'))
  );
  const intel=p.intel?el('div',{class:'intel'},el('span',{class:'intel-ico'},'📡'),el('span',{class:'intel-txt'},p.intel)):null;

  const barColors=['#00F5A0','#FFD166','#FF4D6D'];
  const probs=el('div',{class:'probs'});
  Object.entries(p.probs||{}).filter(([,v])=>v>0).forEach(([lbl,val],i)=>{
    probs.append(el('div',{class:'prob-row'},
      el('span',{class:'prob-lbl'},lbl),
      el('div',{class:'prob-bg'},el('div',{class:'prob-fill',style:{width:`${val}%`,background:barColors[i]||barColors[0]}})),
      el('span',{class:'prob-val',style:{color:barColors[i]||barColors[0]}},`${val}%`)
    ));
  });

  const predBox=el('div',{class:'pred-box'},
    el('div',{class:'pred-res'},el('div',{class:'pred-lbl'},'AI Prediction'),el('div',{class:'pred-val'},p.prediction||'—')),
    Ring(p.confidence||0)
  );

  const body=el('div',{class:'card-body'});
  body.append(matchup);
  if(intel) body.append(intel);
  body.append(probs,predBox);

  // Goals section (soccer only)
  if(p.goals){
    const gs=GoalsSection(p.goals);
    if(gs) body.append(gs);
  }

  const col=p.bet_color||'yellow';
  const ft=el('div',{class:'card-ft'},
    el('div',{class:`bet-badge bet-${col}`},col==='green'?'🔥':col==='red'?'⚠️':'📊',` ${p.bet_value||'MODERATE'}`),
    el('div',{class:'model-acc'},'~71% Model Accuracy')
  );

  card.append(hdr,body,ft);
  return card;
}

async function fetchPredictions(sport){
  try{
    const r=await fetch(`${API_BASE}/${sport}/predict/auto`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    return{preds:d.predictions||[],source:d.source||'live',count:d.count||0};
  }catch{
    const fb=FALLBACK[sport]||[];
    return{preds:fb,source:'curated',count:fb.length};
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function autoSavePredictions(sport, preds){
  if(!preds.length) return;
  try{
    const payload={predictions: preds.map(p=>({
      sport,
      league: p.league||sport,
      home_team: p.home_team,
      away_team: p.away_team,
      match_date: p.date||'',
      prediction: p.prediction||'Unknown',
      confidence: p.confidence||50,
      bet_value: p.bet_value||'MODERATE',
      home_win_prob: p.probs?.['Home Win']||p.probabilities?.home_win||50,
      draw_prob: p.probs?.['Draw']||p.probabilities?.draw||0,
      away_win_prob: p.probs?.['Away Win']||p.probabilities?.away_win||50,
      intel: p.intel||null,
      goals_data: p.goals||null,
      source: p.source||'curated',
    }))};
    await fetch(`${API_BASE}/records/save/bulk`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){console.log('Auto-save failed (backend offline):', e.message);}
}

        }

        // Result input form
        const hInp=el('input',{class:'score-inp',type:'number',min:'0',max:'20',placeholder:'H'});
        const aInp=el('input',{class:'score-inp',type:'number',min:'0',max:'20',placeholder:'A'});
        const saveBtn=el('button',{class:'save-result-btn',onClick:async()=>{
          const h=parseInt(hInp.value), a=parseInt(aInp.value);
          if(isNaN(h)||isNaN(a)){alert('Enter both scores');return;}
          saveBtn.textContent='Saving...';
          saveBtn.disabled=true;
          try{
            const res=await fetch(`${API_BASE}/records/result`,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({prediction_id:p.id,home_score:h,away_score:a})
            });
            const d=await res.json();
            saveBtn.textContent=d.correct?'✅ Correct!':'❌ Wrong';
            saveBtn.style.background=d.correct?'var(--gr)':'var(--rd)';
            p.result={home_score:h,away_score:a,actual_result:d.actual,prediction_correct:d.correct,score:d.score};
            setTimeout(renderRows,1500);
          }catch{saveBtn.textContent='Error';saveBtn.disabled=false;}
        }},r?'Update':'Save');

        const actionCell=r
          ?el('td',{},el('div',{class:'result-form'},hInp,el('span',{style:{color:'var(--mu)'}},'-'),aInp,saveBtn))
          :el('td',{},el('div',{class:'result-form'},hInp,el('span',{style:{color:'var(--mu)'}},'-'),aInp,saveBtn));
        if(r){hInp.value=r.home_score;aInp.value=r.away_score;}

        const betCol=p.bet_value==='HIGH VALUE'?'var(--gr)':p.bet_value==='MODERATE'?'var(--yw)':'var(--rd)';
        const tr=el('tr',{},
          el('td',{style:{color:'var(--mu2)',fontFamily:"'JetBrains Mono',monospace",fontSize:'11px'}},p.date),
          el('td',{},el('span',{class:`sport-tag sport-${p.sport}`},p.sport)),
          el('td',{},
            el('div',{style:{fontWeight:'600',fontSize:'13px'}},`${p.home_team} vs ${p.away_team}`),
            el('div',{style:{color:'var(--mu2)',fontSize:'10px',marginTop:'2px'}},p.league)
          ),
          el('td',{},
            el('div',{style:{fontWeight:'700',color:'var(--ac)'}},p.prediction),
            el('div',{style:{color:betCol,fontSize:'10px',fontWeight:'700',marginTop:'2px'}},p.bet_value)
          ),
          el('td',{style:{fontFamily:"'JetBrains Mono',monospace",fontWeight:'700'}},`${p.confidence}%`),
          el('td',{},el('span',{class:`score-pill ${pillClass}`},pillText)),
          el('td',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:'10px',color:'var(--mu2)'}},goalsStr),
          actionCell
        );
        tbody.append(tr);
      });
    }

    renderRows();
    return wrap;
  }
}

init();
</script>
</body>
</html>
